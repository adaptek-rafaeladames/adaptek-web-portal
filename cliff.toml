# cliff.toml — git-cliff configuration for Adaptek Web Portal
# Docs: https://git-cliff.org/docs/configuration
#
# Usage:
#   After tagging a release, run:
#     git cliff -o CHANGELOG.md
#   Then commit:
#     git add CHANGELOG.md && git commit -m "chore: update CHANGELOG for vX.X"

[changelog]
header = """
# Changelog

All notable changes to the Adaptek web portal are documented here.\n
"""
body = """
{% if version %}\
## [{{ version }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
{% if commits | length > 0 %}\

### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endif %}\
{% endfor %}\n
"""
trim = true
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
  # Skip merge and release bookkeeping commits — they duplicate feat: content
  { message = "^merge",   skip = true },
  { message = "^release", skip = true },
  { message = "^Merge",   skip = true },

  # Standard types → grouped sections
  { message = "^feat",     group = "Features"       },
  { message = "^fix",      group = "Bug Fixes"      },
  { message = "^security", group = "Security"       },
  { message = "^perf",     group = "Performance"    },
  { message = "^refactor", group = "Refactoring"    },
  { message = "^test",     group = "Testing"        },
  { message = "^docs",     group = "Documentation"  },
  { message = "^chore",    group = "Chores"         },
  { message = "^update",   group = "Chores"         },
]

protect_breaking_commits = false
filter_commits = true        # hide commits that don't match any parser
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
topo_order = false
